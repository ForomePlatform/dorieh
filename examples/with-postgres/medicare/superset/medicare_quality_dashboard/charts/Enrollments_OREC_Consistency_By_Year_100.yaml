slice_name: Enrollments OREC Consistency By Year
description: Percent of distinct beneficiaries whose Original Reason for Entitlement
  Code (OREC) is inconsistent across years, by year. OREC is set at enrollment and
  should be invariant for the life of the beneficiary, so any year-to-year variation
  is a data-quality issue surfaced here (expected ~0% on clean data).
