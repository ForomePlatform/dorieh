uuid: adce4851-5172-59af-93bc-1659096abfa4
metrics:
- metric_name: consistent beneficiaries
  verbose_name: '% of consistent beneficiaries'
  metric_type:
  expression: "(public.hll_cardinality(public.hll_union_agg(bene_hll) FILTER (\n        WHERE consistent_dob = 'CONSISTENT'\n        AND consistent_dod <> 'AMBIGUOUS'\n        AND consistent_race = 'CONSISTENT'\n        AND consistent_sex = 'CONSISTENT'\n        ))\n        ) * 100.0 / (public.hll_cardinality(public.hll_union_agg(bene_hll)))"
  description:
  d3format:
  currency:
  extra:
    warning_markdown: ''
  warning_text:
- metric_name: inconsistent_beneficiaries
  verbose_name: '% of inconsistent beneficiaries'
  metric_type:
  expression: "(public.hll_cardinality(public.hll_union_agg(bene_hll) FILTER (\n        WHERE consistent_dob <> 'CONSISTENT'\n        OR consistent_dod = 'AMBIGUOUS'\n        OR consistent_race <> 'CONSISTENT'\n        OR consistent_sex <> 'CONSISTENT'\n        ))\n        ) * 100.0 / (public.hll_cardinality(public.hll_union_agg(bene_hll)))"
  description:
  d3format:
  currency:
  extra:
    warning_markdown: ''
  warning_text:
- metric_name: inconsistent_orec
  verbose_name: '% of beneficiaries with inconsistent OREC (original entitlement reason)'
  metric_type:
  expression: COALESCE(public.hll_cardinality(public.hll_union_agg(bene_hll) FILTER (WHERE consistent_orec <> 'CONSISTENT')), 0) * 100.0 / NULLIF(public.hll_cardinality(public.hll_union_agg(bene_hll)), 0)
  description:
  d3format:
  currency:
  extra:
    warning_markdown: ''
  warning_text:
- metric_name: inconsistent_curec
  verbose_name: '% of enrollment records with inconsistent CUREC (current entitlement reason)'
  metric_type:
  expression: COALESCE(SUM(numrecords) FILTER (WHERE consistent_curec <> 'CONSISTENT'), 0) * 100.0 / NULLIF(SUM(numrecords), 0)
  description:
  d3format:
  currency:
  extra: {}
  warning_text:
- metric_name: inconsistent_zip
  verbose_name: '% of records where zip code is inconsistent with county code'
  metric_type:
  expression: (SUM(numrecords) FILTER (WHERE NOT fips3_valdiated))* 100.0  / (SUM(numrecords))
  description:
  d3format:
  currency:
  extra: {}
  warning_text:
- metric_name: consistent zip
  verbose_name: '% of records where zip code is consistent with county code'
  metric_type:
  expression: (SUM(numrecords) FILTER (WHERE fips3_valdiated))* 100.0  / (SUM(numrecords))
  description:
  d3format:
  currency:
  extra: {}
  warning_text:
- metric_name: bene cardinality
  verbose_name: Number of distinct beneficiaries
  metric_type:
  expression: (public.hll_cardinality(public.hll_union_agg(bene_hll)))::INT
  description:
  d3format:
  currency:
  extra:
    warning_markdown: ''
  warning_text:
- metric_name: count
  verbose_name: Number of enrollment records
  metric_type: count
  expression: SUM(numrecords)
  description:
  d3format:
  currency:
  extra:
    warning_markdown: ''
  warning_text:
